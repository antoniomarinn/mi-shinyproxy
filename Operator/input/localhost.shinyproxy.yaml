proxy:
  usage-stats-url: http://sp-influxdb:8086/write?db=shinyproxy_statistics
  title: Servidor Shinyproxy 
  authentication: simple
  realm-id: localhost
  container-network: sp-shared-network
  docker:
    internal-networking: true
    
  users:
    - name: tic
      password: tic
      groups: [tic]
    - name: calidad
      password: calidad
      groups: [calidad]
    - name: comercial
      password: comercial
      groups: [comercial]
    - name: gerencia
      password: gerencia
      groups: [gerencia]
  admin-groups: [tic]
  specs:
    - id: informes1
      display-name: Informe de Reportes
      container-image: app-informes:v3
      container-cmd: ["/bin/sh", "-c", "cp /usr/share/nginx/html/systemd_report_MG.html /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"]
      port: 80
      access-groups: [ tic,calidad ]
      container-network: sp-shared-network
      
    - id: informes2
      display-name: Informe de Cargas
      container-image: app-informes:v3
      container-cmd: ["/bin/sh", "-c", "cp /usr/share/nginx/html/report_cargas.html /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"]
      port: 80
      access-groups: [ tic,comercial ]
      container-network: sp-shared-network 
    
    - id: informes3
      display-name: Informe de Claims
      container-image: app-informes:v3
      container-cmd: ["/bin/sh", "-c", "cp /usr/share/nginx/html/report_claims.html /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"]
      port: 80
      access-groups: [ tic,gerencia ]
      container-network: sp-shared-network
      
    - id: informes4
      display-name: Informe de Plataformas
      container-image: app-informes:v3
      container-cmd: ["/bin/sh", "-c", "cp /usr/share/nginx/html/report_platform.html /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"]
      port: 80
      access-groups: [tic]
      container-network: sp-shared-network
    
    - id: informes5
      display-name: Informe de Rotación
      container-image: app-informes:v3
      container-cmd: ["/bin/sh", "-c", "cp /usr/share/nginx/html/report_rotacion.html /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"]
      port: 80
      access-groups: [tic]
      container-network: sp-shared-network
      
    - id: app1
      display-name: App Calidad 
      container-cmd: ["R", "-e", "shiny::runApp('/srv/shiny-server/app1', host='0.0.0.0', port=3838)"]
      container-image: shiny-apps:latest
      access-groups: [ tic,calidad ]
      container-network: sp-shared-network
    
    - id: app2
      display-name: App Comercial
      container-cmd: ["R", "-e", "shiny::runApp('/srv/shiny-server/app2', host='0.0.0.0', port=3838)"]
      container-image: shiny-apps:latest
      access-groups: [ tic,comercial ]
      container-network: sp-shared-network
    
    - id: app3
      display-name: App Gerencia
      container-cmd: ["R", "-e", "shiny::runApp('/srv/shiny-server/app3', host='0.0.0.0', port=3838)"]
      container-image: shiny-apps:latest
      access-groups: [ tic,gerencia ]
      container-network: sp-shared-network
      
    - id: admin-grafana
      display-name: ⚙️ Panel de Estadísticas
      description: Acceso exclusivo para administradores
      container-image: nginx:alpine
      port: 80
      access-users:
        - tic
      container-cmd: ["sh", "-c", "echo '<!DOCTYPE html><html><body style=\"background:#2b2b2b; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;\"><a href=\"http://linuxprod01:3000\" target=\"_blank\" style=\"background-color:#E5822B; color:white; padding:20px 40px; text-decoration:none; font-size:24px; border-radius:8px; font-weight:bold; box-shadow: 0 4px 8px rgba(0,0,0,0.3);\">Abrir Grafana</a></body></html>' > /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"]
   
server:
  forward-headers-strategy: native

image: openanalytics/shinyproxy:3.2.3
fqdn: linuxprod01
